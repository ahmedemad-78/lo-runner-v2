<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · LO Test Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='1' y='1' width='22' height='22' rx='6' fill='%230d9488'/%3E%3Crect x='5' y='7' width='14' height='11' rx='1.5' fill='none' stroke='white' stroke-width='1.5'/%3E%3Cpath d='M8.5 13.5l2 2 4.5-5' fill='none' stroke='white' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <style>
    :root {
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 118, 110, 0.16);
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --panel: #ffffff;
      --page: #f4f7f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 520px at 8% -8%, rgba(13,148,136,0.16), transparent 55%),
        radial-gradient(800px 420px at 100% 0%, rgba(15,118,110,0.10), transparent 50%),
        var(--page);
    }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
    }
    .aside {
      display: flex;
      align-items: center;
      padding: 48px;
      border-right: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(13,148,136,0.08), transparent 45%);
    }
    .aside-inner { max-width: 420px; }
    .mark {
      width: 48px; height: 48px; display: grid; place-items: center;
      border-radius: 12px; color: var(--teal); background: #fff;
      border: 1px solid var(--line); margin-bottom: 24px;
    }
    .mark svg { width: 26px; height: 26px; }
    .kicker {
      font-family: Outfit, sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--teal-dark); margin-bottom: 10px;
    }
    .aside h1 {
      font-family: Outfit, sans-serif; font-size: clamp(1.7rem, 2.4vw, 2.15rem);
      line-height: 1.15; font-weight: 700; margin-bottom: 12px;
    }
    .aside p { color: var(--muted); line-height: 1.55; font-size: 0.98rem; }
    .main { display: grid; place-items: center; padding: 32px 24px; }
    .card {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      padding: 32px 28px;
    }
    .eyebrow {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--teal-dark); margin-bottom: 6px;
    }
    .card h2 {
      font-family: Outfit, sans-serif; font-size: 1.55rem; font-weight: 700;
      color: var(--ink); margin-bottom: 6px;
    }
    .sub { color: var(--muted); font-size: 0.92rem; line-height: 1.45; margin-bottom: 22px; }
    label {
      display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 8px;
    }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .row .material-symbols-outlined { color: #94a3b8; font-size: 20px; }
    input[type="text"] {
      width: 100%; height: 44px; padding: 0 12px;
      border: 1px solid rgba(71, 85, 105, 0.28); border-radius: 8px;
      background: #f8fafc; color: var(--ink);
      font-family: "IBM Plex Mono", monospace; font-size: 0.95rem; letter-spacing: 0.05em;
    }
    input[type="text"]:focus {
      outline: none; border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.22);
    }
    .error { color: #be123c; font-size: 0.85rem; margin-bottom: 12px; }
    .error[hidden] { display: none !important; }
    button[type="submit"] {
      width: 100%; height: 44px; border: 0; border-radius: 8px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--teal); color: #fff; font-family: inherit; font-size: 0.92rem; font-weight: 600;
    }
    button[type="submit"]:hover { background: var(--teal-dark); }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }
    button .material-symbols-outlined { font-size: 18px; color: #fff; }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .aside { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="aside" aria-hidden="true">
      <div class="aside-inner">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="4.5" width="18" height="15" rx="2.25" stroke="currentColor" stroke-width="1.75"/>
            <line x1="3" y1="8.25" x2="21" y2="8.25" stroke="currentColor" stroke-width="1.25" opacity="0.45"/>
            <path d="M8.25 14.25l2.5 2.5 5.25-6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="kicker">LO Test Runner</p>
        <h1>QA workspace for iframe learning objects</h1>
        <p>Sign in with your access code to record results, review outcomes, and manage team tasks.</p>
      </div>
    </aside>

    <main class="main">
      <form class="card" id="loginForm" autocomplete="off">
        <p class="eyebrow">Welcome back</p>
        <h2>Sign in</h2>
        <p class="sub">Enter the access code issued by your team leader.</p>

        <label for="accessCodeInput">Access code</label>
        <div class="row">
          <span class="material-symbols-outlined" aria-hidden="true">key</span>
          <input
            type="text"
            id="accessCodeInput"
            name="access_code"
            placeholder="e.g. vq3dawf"
            maxlength="16"
            spellcheck="false"
            autocapitalize="off"
            autocomplete="username"
            required
          >
        </div>

        <p class="error" id="loginError" hidden></p>

        <button type="submit" id="loginBtn">
          <span class="material-symbols-outlined" aria-hidden="true">login</span>
          Continue
        </button>
      </form>
    </main>
  </div>

  <script src="js/vendor/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      if (LOAuth.getSession()) {
        location.replace("./app.html");
        return;
      }
      const form = document.getElementById("loginForm");
      const input = document.getElementById("accessCodeInput");
      const errorEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      input.addEventListener("input", function () {
        this.value = this.value.toLowerCase().replace(/[^a-z0-9]/g, "");
        errorEl.hidden = true;
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorEl.hidden = true;
        const code = input.value.trim();
        if (!code) {
          errorEl.textContent = "Enter your access code.";
          errorEl.hidden = false;
          return;
        }
        btn.disabled = true;
        try {
          await LOAuth.loginWithAccessCode(code);
          location.replace("./app.html");
        } catch (err) {
          errorEl.textContent = err.message || "Invalid access code.";
          errorEl.hidden = false;
          btn.disabled = false;
          input.focus();
        }
      });
      input.focus();
    })();
  </script>
</body>
</html>
