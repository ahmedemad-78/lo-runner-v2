<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · LO Test Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='1' y='1' width='22' height='22' rx='6' fill='%230d9488'/%3E%3Crect x='5' y='7' width='14' height='11' rx='1.5' fill='none' stroke='white' stroke-width='1.5'/%3E%3Cline x1='5' y1='10' x2='19' y2='10' stroke='white' stroke-width='1' opacity='0.55'/%3E%3Cpath d='M8.5 13.5l2 2 4.5-5' fill='none' stroke='white' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body class="auth-body">
  <div class="auth-shell">
    <aside class="auth-aside" aria-hidden="true">
      <div class="auth-aside-inner">
        <div class="auth-mark">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="4.5" width="18" height="15" rx="2.25" stroke="currentColor" stroke-width="1.75"/>
            <line x1="3" y1="8.25" x2="21" y2="8.25" stroke="currentColor" stroke-width="1.25" opacity="0.45"/>
            <path d="M8.25 14.25l2.5 2.5 5.25-6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="auth-aside-kicker">LO Test Runner</p>
        <h1 class="auth-aside-title">QA workspace for iframe learning objects</h1>
        <p class="auth-aside-copy">Sign in with your access code to record results, review outcomes, and manage team tasks.</p>
      </div>
    </aside>

    <main class="auth-main">
      <form class="auth-card" id="loginForm" autocomplete="off">
        <p class="auth-eyebrow">Welcome back</p>
        <h2 class="auth-title">Sign in</h2>
        <p class="auth-subtitle">Enter the access code issued by your team leader.</p>

        <label class="auth-label" for="accessCodeInput">Access code</label>
        <div class="auth-input-row">
          <span class="material-symbols-outlined auth-input-icon" aria-hidden="true">key</span>
          <input
            type="text"
            id="accessCodeInput"
            name="access_code"
            class="auth-input"
            placeholder="e.g. vq3dawf"
            maxlength="16"
            spellcheck="false"
            autocapitalize="off"
            autocomplete="username"
            required
          >
        </div>

        <p class="auth-error" id="loginError" hidden></p>

        <button type="submit" class="btn btn-primary auth-submit" id="loginBtn">
          <span class="material-symbols-outlined">login</span>
          Continue
        </button>
      </form>
    </main>
  </div>

  <script src="js/vendor/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const existing = LOAuth.getSession();
      if (existing) {
        window.location.replace("./app.html");
        return;
      }

      if (localStorage.getItem("darkMode") === "1") {
        document.body.classList.add("dark");
      }

      const form = document.getElementById("loginForm");
      const input = document.getElementById("accessCodeInput");
      const errorEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      input.addEventListener("input", function () {
        this.value = this.value.toLowerCase().replace(/[^a-z0-9]/g, "");
        errorEl.hidden = true;
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errorEl.hidden = true;
        const code = input.value.trim();
        if (!code) {
          errorEl.textContent = "Enter your access code.";
          errorEl.hidden = false;
          return;
        }
        btn.disabled = true;
        try {
          await LOAuth.loginWithAccessCode(code);
          window.location.replace("./app.html");
        } catch (err) {
          errorEl.textContent = err.message || "Invalid access code.";
          errorEl.hidden = false;
          btn.disabled = false;
          input.focus();
        }
      });

      input.focus();
    })();
  </script>
</body>
</html>
